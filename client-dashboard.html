<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Client Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="client-dashboard.css">

<style>

/* RECENT DOCUMENT STYLE */

.doc-row{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px 0;
border-bottom:1px solid #eee;
}

.view-btn{
background:#263d7d;
color:white;
padding:6px 14px;
border-radius:5px;
text-decoration:none;
font-size:13px;
font-weight:500;
}

.view-btn:hover{
background:#1748c5;
}

.doc-item{
display:flex;
justify-content:space-between;
align-items:center;
padding:10px;
margin-bottom:8px;
background:white;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.doc-actions{
display:flex;
gap:10px;
}

.view-btn{
background:#324a88;
color:white;
border:none;

padding:6px 12px;
border-radius:5px;
cursor:pointer;
}
.view-btn:hover{
background:#1748c5;
}

.download-btn{
background:#28a745;
color:white;
border:none;
padding:6px 12px;
border-radius:5px;
cursor:pointer;
}
.download-btn:hover{
background:#1e7e34;
}


</style>

</head>
<body>

<div class="sidebar">
<h2>Clients Portal</h2>

<div class="menu-item" id="profileBtn">Profile</div>
<div class="menu-item" id="logoutBtn">Logout</div>
</div>

<div class="main">

<div class="welcome">
<h2>Welcome, <span id="clientName">Client</span></h2>
<p>Access and download your tax documents below.</p>
</div>


<div class="cards">

<div class="card">
<h3>GST Documents</h3>
<h1 id="gstCount">0</h1>
<a href="client-doc-filter.html?service=GST" class="action-btn">View All</a>
</div>

<div class="card">
<h3>ITR Documents</h3>
<h1 id="itrCount">0</h1>
<a href="client-doc-filter.html?service=ITR" class="action-btn">View All</a>
</div>

<div class="card">
<h3>TDS Documents</h3>
<h1 id="tdsCount">0</h1>
<a href="client-doc-filter.html?service=TDS" class="action-btn">View All</a>
</div>

</div>


<div class="recent">
<h3>Recent Documents</h3>
<div id="recentDocs"></div>
</div>

</div>

<script type="module">

import { auth, db } from "./firebase.js";

import { onAuthStateChanged, signOut }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

import { doc, getDoc, collection, getDocs, query, orderBy }
from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const clientName = document.getElementById("clientName");

const gstCount = document.getElementById("gstCount");
const itrCount = document.getElementById("itrCount");
const tdsCount = document.getElementById("tdsCount");

const recentDocs = document.getElementById("recentDocs");


// AUTH CHECK
onAuthStateChanged(auth, async (user) => {

if (user) {

try {

const docRef = doc(db, "clients", user.uid);
const docSnap = await getDoc(docRef);

if (docSnap.exists()) {

const data = docSnap.data();
clientName.innerText = data.name;

}

loadDocuments(user.uid);

} catch (error) {

console.log(error);

}

} else {

window.location.href = "client-login.html";

}

});


// LOAD DOCUMENTS
async function loadDocuments(uid){

const docsRef = collection(db, "clients", uid, "documents");

const q = query(docsRef, orderBy("year", "desc"));

const snapshot = await getDocs(q);

let gst = 0;
let itr = 0;
let tds = 0;

recentDocs.innerHTML = "";

let count = 0;

snapshot.forEach((docSnap)=>{

const data = docSnap.data();

// COUNT ALL DOCUMENTS
if(data.service === "GST") gst++;
else if(data.service === "ITR") itr++;
else if(data.service === "TDS") tds++;

// SHOW ONLY 5 RECENT DOCUMENTS
if(count < 5){

const div = document.createElement("div");

div.className = "doc-row";

div.innerHTML = `
<div>${data.title}</div>
<a href="${data.link}" target="_blank" class="view-btn">View</a>
`;

recentDocs.appendChild(div);

count++;

}

});

gstCount.innerText = gst;
itrCount.innerText = itr;
tdsCount.innerText = tds;

}


// LOGOUT
const profileBtn = document.getElementById("profileBtn");

profileBtn.addEventListener("click", () => {

window.location.href = "client_profile.html";

});
const logoutBtn = document.getElementById("logoutBtn");

logoutBtn.addEventListener("click", async () => {

const confirmLogout = confirm("Are you sure you want to logout?");

if(confirmLogout){

await signOut(auth);
window.location.href = "client-login.html";

}

});


</script>

</body>
</html>
